# This is the NeoForge mods.toml file for NeoForge 1.21.1+
# The name of the mod loader type to load - for regular FML @Mod mods it should be javafml
modLoader="javafml" #mandatory
# A version range to match for said mod loader - for NeoForge 1.21.1 FML version is 4.x
loaderVersion="[4,)" #mandatory
# The license for your mod
license="CC0-1.0"
# A list of mods - how many allowed here is determined by the individual mod loader
[[mods]] #mandatory
# The modid of the mod
modId="usefultoolsmod" #mandatory
# The version number of the mod
version="2.1.01-1.21.1-neoforge" #mandatory
# A display name for the mod
displayName="The Useful Tools Mod" #mandatory
# A file name (in the root of the mod JAR) containing a logo for display
logoFile="grenade.png" #optional
# A text field displayed in the mod UI
authors="stonytark_mkii" #optional
# The description text for the mod (multi line!)
description='''A simple mod adding various tools and armor based on reinforced versions of common materials.'''

# Dependencies for this mod
[[dependencies.usefultoolsmod]] #optional
    # the modid of the dependency
    modId="neoforge" #mandatory
    # Does this dependency have to exist - if not, ordering below must be specified
    mandatory=true #mandatory
    # The version range of the NeoForge dependency
    versionRange="[21.1,)" #mandatory
    ordering="NONE"
    side="BOTH"

[[dependencies.usefultoolsmod]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.21.1,1.22)"
    ordering="NONE"
    side="BOTH"
